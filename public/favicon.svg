<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dim Print Shop favicon: dark warm-gray chrome, one brass accent, a lit
       paper page tilted slightly as if resting on a desk. Flat, no gradients. -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#25221f"/>
  <g transform="translate(32,32) rotate(-4) translate(-15,-21)">
    <rect x="0" y="0" width="30" height="42" fill="#faf9f6"/>
    <rect x="5" y="7" width="20" height="5" fill="#c9a35c"/>
    <rect x="5" y="18" width="20" height="3" fill="#b7b1a8"/>
    <rect x="5" y="24" width="20" height="3" fill="#b7b1a8"/>
    <rect x="5" y="30" width="13" height="3" fill="#b7b1a8"/>
  </g>
</svg>
