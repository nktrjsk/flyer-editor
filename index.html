<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samostuduj — editor letáku</title>
  <!-- Enables SharedArrayBuffer + OPFS on GitHub Pages (no server header support).
       coi-serviceworker injects Cross-Origin-Opener-Policy and
       Cross-Origin-Embedder-Policy headers via a service worker. -->
  <!-- Referenced base-less, as Vite requires for public-dir assets: Vite
       prepends the configured base itself in dev AND build. A hardcoded
       /flyer-editor/ prefix got doubled by the dev server, 404ing the script
       in dev (no crossOriginIsolated there). -->
  <script src="/coi-serviceworker.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Static layout frame painted before the JS bundle + style.css load, so the
       first paint is the editor's shape (not a black/white screen or spinner).
       It flows seamlessly into the React placeholder, which React mounts in
       place of #root's contents. No animation — nothing to distract. -->
  <style>
    html, body { height: 100%; margin: 0; background: #191c1e; }
    #initial-loader { display: flex; flex-direction: column; height: 100%; }
    #initial-loader .il-toolbar { height: 44px; background: #1d6a5e; flex: none; }
    #initial-loader .il-body { flex: 1; display: flex; min-height: 0; }
    #initial-loader .il-sidebar { width: 220px; background: #141618; }
    #initial-loader .il-source { width: 400px; background: #191c1e; }
    #initial-loader .il-preview { flex: 1; background: #bfbcb4; }
  </style>
</head>
<body>
  <div id="root"><div id="initial-loader">
    <div class="il-toolbar"></div>
    <div class="il-body">
      <div class="il-sidebar"></div>
      <div class="il-source"></div>
      <div class="il-preview"></div>
    </div>
  </div></div>
  <script>
    // Boot watchdog: if React hasn't replaced #initial-loader within 12s — e.g.
    // a stale service worker or failed bundle stops the app booting at all —
    // turn the static frame into an escape hatch so the user is never stranded.
    // (Once React mounts, #initial-loader is gone and this is a no-op.)
    (function () {
      window.__resetApp = function () {
        var reload = function () { location.reload(); };
        var jobs = [];
        try { if (navigator.serviceWorker) jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })); } catch (e) {}
        try { if (window.caches) jobs.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })); } catch (e) {}
        try { localStorage.clear(); } catch (e) {}
        Promise.all(jobs).then(reload, reload);
      };
      setTimeout(function () {
        var el = document.getElementById('initial-loader');
        if (!el) return;
        el.innerHTML =
          '<div style="margin:auto;max-width:340px;text-align:center;color:#ccc9c2;font-family:Georgia,serif;padding:24px">' +
          '<p style="font-size:17px;font-weight:600;color:#fff;margin:0 0 8px">Aplikaci se nepodařilo načíst</p>' +
          '<p style="font-size:13px;color:#9a9690;line-height:1.5;margin:0 0 18px">Zkuste obnovit stránku. Pokud problém přetrvává, vymažte lokální data tohoto prohlížeče.</p>' +
          '<button onclick="location.reload()" style="font-family:Georgia,serif;font-size:13px;padding:7px 16px;margin:0 5px;border-radius:4px;cursor:pointer;border:1px solid #3a3d3f;background:#2a2f31;color:#ccc9c2">Načíst znovu</button>' +
          '<button onclick="window.__resetApp()" style="font-family:Georgia,serif;font-size:13px;padding:7px 16px;margin:0 5px;border-radius:4px;cursor:pointer;border:1px solid #633;background:#2a2f31;color:#f88">Vymazat data a obnovit</button>' +
          '</div>';
      }, 12000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
