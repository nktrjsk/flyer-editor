<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor letáku</title>
  <meta name="description" content="Prohlížečový editor A5 letáků — Markdown na vstupu, tiskové PDF, HTML nebo PNG na výstupu. Data zůstávají v prohlížeči, synchronizace mezi zařízeními přes mnemonickou frázi, žádný server.">
  <!-- Open Graph / Twitter: URLs are hardcoded to the canonical GitHub Pages
       deployment (https://nktrjsk.github.io/flyer-editor/) since crawlers need
       absolute URLs regardless of where this HTML is served from. -->
  <meta property="og:title" content="Editor letáku">
  <meta property="og:description" content="Prohlížečový editor A5 letáků — Markdown na vstupu, tiskové PDF, HTML nebo PNG na výstupu. Data zůstávají v prohlížeči, synchronizace mezi zařízeními přes mnemonickou frázi, žádný server.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nktrjsk.github.io/flyer-editor/">
  <meta property="og:locale" content="cs_CZ">
  <meta property="og:image" content="https://nktrjsk.github.io/flyer-editor/social-preview.png">
  <meta property="og:image:width" content="1600">
  <meta property="og:image:height" content="800">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://nktrjsk.github.io/flyer-editor/social-preview.png">
  <!-- Referenced base-less, as Vite requires for public-dir assets: Vite
       prepends the configured base itself in dev AND build (see the
       coi-serviceworker.js comment below for the same rule). -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Enables SharedArrayBuffer + OPFS on GitHub Pages (no server header support).
       coi-serviceworker injects Cross-Origin-Opener-Policy and
       Cross-Origin-Embedder-Policy headers via a service worker. -->
  <!-- Referenced base-less, as Vite requires for public-dir assets: Vite
       prepends the configured base itself in dev AND build. A hardcoded
       /flyer-editor/ prefix got doubled by the dev server, 404ing the script
       in dev (no crossOriginIsolated there). -->
  <script src="/coi-serviceworker.js"></script>
  <!-- Static layout frame painted before the JS bundle + style.css load, so the
       first paint is the editor's shape (not a black/white screen or spinner).
       It flows seamlessly into the React placeholder, which React mounts in
       place of #root's contents. No animation — nothing to distract. -->
  <style>
    /* Hex mirrors of the --ui-* OKLCH tokens in style.css (pre-CSS paint). */
    html, body { height: 100%; margin: 0; background: #25221f; }
    #initial-loader { display: flex; flex-direction: column; height: 100%; }
    #initial-loader .il-toolbar { height: 52px; background: #25221f; border-bottom: 1px solid #4b4741; flex: none; box-sizing: border-box; }
    #initial-loader .il-body { flex: 1; display: flex; min-height: 0; }
    #initial-loader .il-sidebar { width: 280px; background: #25221f; border-right: 1px solid #4b4741; box-sizing: border-box; }
    #initial-loader .il-source { width: 420px; background: #2b2825; border-right: 1px solid #4b4741; box-sizing: border-box; }
    #initial-loader .il-preview { flex: 1; background: #1d1a15; }
  </style>
</head>
<body>
  <div id="root"><div id="initial-loader">
    <div class="il-toolbar"></div>
    <div class="il-body">
      <div class="il-sidebar"></div>
      <div class="il-source"></div>
      <div class="il-preview"></div>
    </div>
  </div></div>
  <script>
    // Boot watchdog: if React hasn't replaced #initial-loader within 12s — e.g.
    // a stale service worker or failed bundle stops the app booting at all —
    // turn the static frame into an escape hatch so the user is never stranded.
    // (Once React mounts, #initial-loader is gone and this is a no-op.)
    (function () {
      window.__resetApp = function () {
        var reload = function () { location.reload(); };
        var jobs = [];
        try { if (navigator.serviceWorker) jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })); } catch (e) {}
        try { if (window.caches) jobs.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })); } catch (e) {}
        try { localStorage.clear(); } catch (e) {}
        Promise.all(jobs).then(reload, reload);
      };
      setTimeout(function () {
        var el = document.getElementById('initial-loader');
        if (!el) return;
        el.innerHTML =
          '<div style="margin:auto;max-width:340px;text-align:center;color:#c3bdb3;font-family:system-ui,sans-serif;padding:24px">' +
          '<p style="font-size:17px;font-weight:600;color:#ebe7df;margin:0 0 8px">Aplikaci se nepodařilo načíst</p>' +
          '<p style="font-size:13px;color:#a39e95;line-height:1.5;margin:0 0 18px">Zkuste obnovit stránku. Pokud problém přetrvává, vymažte lokální data tohoto prohlížeče.</p>' +
          '<button onclick="location.reload()" style="font-family:system-ui,sans-serif;font-size:13px;padding:8px 16px;margin:0 5px;border-radius:6px;cursor:pointer;border:1px solid #4b4741;background:#383530;color:#c3bdb3">Načíst znovu</button>' +
          '<button onclick="window.__resetApp()" style="font-family:system-ui,sans-serif;font-size:13px;padding:8px 16px;margin:0 5px;border-radius:6px;cursor:pointer;border:1px solid #7a3a30;background:transparent;color:#f17264">Vymazat data a obnovit</button>' +
          '</div>';
      }, 12000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
